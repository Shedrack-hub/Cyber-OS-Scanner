<!DOCTYPE html>
<html>
<head>
  <title>Cyber OS</title>
 <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<!-- BOOT SCREEN -->
<div id="boot">
  <h1>CYBER OS v1.0</h1>
  <p id="bootText">Booting system...</p>
</div>

<!-- MAIN SYSTEM -->
<div id="system" class="hidden">

  <div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <h2>🧠 CYBER OS</h2>

      <div class="status">
        🟢 System: Online<br>
        🔐 Firewall: Active<br>
        📡 Scanner: Ready<br>
        ⚡ Engine: Stable
      </div>
    </div>

    <!-- MAIN -->
    <div class="main">

      <h1>💻 Network Control Terminal</h1>

      <div class="terminal">
        <p>> enter command:</p>
        <input id="target" placeholder="scan 127.0.0.1">
        <button onclick="scan()">RUN</button>
      </div>

      <div id="result"></div>

      <div id="logs" class="terminal"></div>

    </div>
  </div>

</div>

<script>

/* ================= BOOT ANIMATION ================= */

const bootMessages = [
  "Initializing kernel...",
  "Loading security modules...",
  "Starting network scanner...",
  "Activating firewall...",
  "System ready ✔"
];

let i = 0;

function bootSequence() {
  const text = document.getElementById("bootText");

  let interval = setInterval(() => {
    text.innerHTML = bootMessages[i];
    i++;

    if (i >= bootMessages.length) {
      clearInterval(interval);

      setTimeout(() => {
        document.getElementById("boot").style.display = "none";
        document.getElementById("system").classList.remove("hidden");
      }, 800);
    }
  }, 700);
}

bootSequence();

/* ================= LOGGING ================= */

const logBox = document.getElementById("logs");

function log(msg) {
  logBox.innerHTML += msg + "<br>";
  logBox.scrollTop = logBox.scrollHeight;
}

/* ================= SCAN LOCK (FIX SPAM) ================= */

let scanning = false;

/* ================= SCAN FUNCTION ================= */

async function scan() {

  if (scanning) return;   // ❌ prevents double runs
  scanning = true;

  const input = document.getElementById("target").value;
  let target = input.replace("scan ", "");

  const resultBox = document.getElementById("result");

  /* CLEAR LOGS EVERY SCAN (FIX REPEAT BUG) */
  logBox.innerHTML = "";

  resultBox.innerHTML = `
    <div class="loading">
      🔍 Initializing scan...<br>
      📡 Target: ${target}<br>
      ⚡ Sending packets...
    </div>
  `;

  log("Initializing scan...");
  log("📡 Resolving target...");
  log("⚡ Sending packets...");
  log("📊 Analyzing ports...");

  const res = await fetch("/scan", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ target })
  });

  const data = await res.json();
  const ports = data.open_ports || [];

  /* CLEAN LOG OUTPUT */
  ports.forEach(p => {

    if (p.port === "-" || p.service === "SECURE HOST") {
      log(`🛡 SYSTEM SECURE: No open ports detected`);
    } else {
      log(`✔ ${p.port} → ${p.service}`);
    }

  });

  setTimeout(() => {

    if (ports.length === 0) {
      resultBox.innerHTML = `
        <div style="color:#00ff88">
          <h3>SCAN COMPLETE</h3>
          <p>✔ No open ports detected</p>
          <p>✔ Host appears secure or filtered</p>
        </div>
      `;

      scanning = false;
      return;
    }

    let html = `<h3>SCAN RESULTS</h3><div class="grid">`;

    let riskScore = 0;

    ports.forEach(p => {

      if (p.risk === "High") riskScore += 40;
      else if (p.risk === "Medium") riskScore += 20;
      else riskScore += 5;

      let cls =
        p.risk === "High" ? "card high" :
        p.risk === "Medium" ? "card medium" :
        "card low";

      html += `
        <div class="${cls}">
          <h3>${p.ip}</h3>

          <p><b>Type:</b> ${p.ip_type || "IPv4"}</p>
          <p><b>Port:</b> ${p.port}</p>
          <p><b>Service:</b> ${p.service}</p>
          <p><b>Risk:</b> ${p.risk}</p>
          <p style="opacity:0.8">${p.description}</p>
        </div>
      `;
    });

    html += `
      <div style="margin-top:20px; color:#00ff88;">
        <h3>SECURITY ANALYSIS</h3>
        <p>
          • High Risk = insecure services exposed<br>
          • Medium Risk = legacy or unencrypted services<br>
          • Low Risk = secure or encrypted services
        </p>
      </div>

      <div style="margin-top:20px; color:#00ff88;">
        <h3>VULNERABILITY SCORE: ${riskScore}/100</h3>
      </div>
    `;

    resultBox.innerHTML = html;

    scanning = false; // ✅ unlock scan

  }, 1200);
}

</script>

</body>
</html>
